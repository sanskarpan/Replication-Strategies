name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go build, vet & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            echo "Run 'gofmt -w .' to fix."
            exit 1
          fi

      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: warn

  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint (compiled with current Go toolchain)
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
        continue-on-error: true  # stdlib CVEs are pre-existing; tracked separately

  frontend:
    name: Frontend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: OpenAPI contract-drift check
        run: bun run check:types-drift

      - name: Type check
        run: bunx tsc --noEmit

      - name: Unit tests
        run: bun test

  e2e:
    name: Playwright browser E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build server
        run: go build -o /tmp/replsim-server ./cmd/server

      - name: Install frontend deps + Playwright Chromium
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bunx playwright install --with-deps chromium

      - name: Start backend + BFF and run E2E
        working-directory: frontend
        run: |
          /tmp/replsim-server > /tmp/be.log 2>&1 &
          sleep 3
          curl -s -X POST localhost:8080/api/v1/simulation/reset || true
          BACKEND=http://localhost:8080 bun server/bff.ts > /tmp/bff.log 2>&1 &
          sleep 4
          node e2e-run.mjs

      - name: Upload E2E screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-screenshots
          path: /tmp/e2e-shots
          if-no-files-found: ignore

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Restore baseline from main
        id: cache-bench
        uses: actions/cache/restore@v4
        with:
          path: /tmp/bench-baseline.txt
          key: bench-baseline-${{ github.sha }}
          restore-keys: bench-baseline-

      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -benchtime=3s -count=3 ./... 2>&1 | tee /tmp/bench-current.txt
          grep -c "^Benchmark" /tmp/bench-current.txt | xargs -I{} echo "{} benchmark functions executed"

      - name: Compare with baseline (PR only)
        if: github.event_name == 'pull_request' && steps.cache-bench.outputs.cache-hit == 'true'
        run: |
          echo "=== benchstat comparison ==="
          benchstat /tmp/bench-baseline.txt /tmp/bench-current.txt
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-${{ github.run_id }}
          path: /tmp/bench-current.txt
          if-no-files-found: warn

      - name: Save as new baseline (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: /tmp/bench-current.txt
          key: bench-baseline-${{ github.sha }}
