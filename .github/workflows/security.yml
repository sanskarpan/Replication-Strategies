name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run gosec
        uses: securego/gosec@master
        with:
          # G104/G108/G112/G114/G115/G304/G404 are intentional in a simulator:
          # fire-and-forget goroutines, guarded pprof, no-timeout internal server,
          # integer narrowing, config-file inclusion, math/rand for determinism.
          args: -exclude=G104,G108,G112,G114,G115,G304,G404 ./...

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
