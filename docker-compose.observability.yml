# Observability stack: Prometheus + Grafana, wired to the backend's /metrics endpoint.
#
# This joins the same `repl-net` network the app's docker-compose.yml creates, so
# Prometheus can reach the `backend` service by name. Bring the app up first:
#
#   docker compose up -d                              # creates network + backend
#   docker compose -f docker-compose.observability.yml up -d
#
# Grafana:    http://localhost:3000  (admin / admin)
# Prometheus: http://localhost:9090
#
# If you prefer a single command, merge both files:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: replsim-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - repl-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: replsim-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - repl-net
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

# The app's docker-compose.yml owns this network; we attach to it as external so
# Prometheus resolves the `backend` hostname. If you run this stack standalone
# (without the app compose), remove `external: true` to let it be created here.
networks:
  repl-net:
    external: true
    name: replication-strategies_repl-net
