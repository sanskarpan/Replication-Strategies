# Grafana dashboard provisioning: load JSON dashboards from the mounted directory.
apiVersion: 1

providers:
  - name: replsim-dashboards
    orgId: 1
    folder: replsim
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
