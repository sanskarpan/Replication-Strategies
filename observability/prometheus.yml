# Prometheus scrape configuration for the replication-strategies backend.
# The backend exposes Prometheus text-format metrics at /metrics (see gateway/ops.go).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: replsim
    metrics_path: /metrics
    scrape_interval: 5s
    static_configs:
      - targets:
          - backend:8080
        labels:
          service: replsim-backend
